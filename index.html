<!DOCTYPE html>
<html>
<head>
<title>AI Video Generator</title>
<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}
button{
background:#00ff00;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
textarea{
width:80%;
height:120px;
border-radius:10px;
padding:10px;
}
</style>
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
(function(){
   emailjs.init("YOUR_USER_ID"); // یہ آپ EmailJS سے لیں گے
})();
function sendPrompt(){
   var prompt = document.getElementById("prompt").value;
   if(prompt==""){ alert("Please enter a prompt"); return; }
   emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{message: prompt})
   .then(function(){ alert("Prompt sent successfully!"); },
         function(err){ alert("Error sending prompt: "+JSON.stringify(err)); });
}
</script>
</head>
<body>

<h1>Premium AI Video Generator</h1>
<p>Enter your prompt below</p>

<textarea id="prompt" placeholder="Type your prompt here..."></textarea>
<br><br>
<button onclick="sendPrompt()">Generate Video</button>

<p style="margin-top:40px;">Coming Soon 🚀</p>

</body>
</html>
