<!DOCTYPE html>
<html>
<head>
<title>AI Video Generator</title>
<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}
button{
background:#00ff00;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
textarea{
width:80%;
height:120px;
border-radius:10px;
padding:10px;
color: black;
}
</style>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
   // Aapki confirm Public Key jo screenshot mein hai
   emailjs.init("7nmy7Endz5mBgcErO"); 
})();

function sendPrompt(){
   var btn = document.querySelector("button");
   var promptValue = document.getElementById("prompt").value;
   
   if(promptValue == ""){ 
      alert("Please enter a prompt"); 
      return; 
   }

   // Button ko disable karein taaki bar bar click na ho
   btn.disabled = true;
   btn.innerText = "Sending...";

   var templateParams = {
      message: promptValue
   };

   // Service ID: service_e2ix46l
   // Template ID: template_7rjirg
   emailjs.send("service_e2ix46l", "template_7rjirg", templateParams)
   .then(function(response) {
      alert("Mubarak ho! Prompt mil gaya hai.");
      document.getElementById("prompt").value = ""; 
      btn.disabled = false;
      btn.innerText = "Generate Video";
   }, function(error) {
      alert("Masla aa gaya hai: " + JSON.stringify(error));
      btn.disabled = false;
      btn.innerText = "Generate Video";
   });
}
</script>
</head>
<body>

<h1>Premium AI Video Generator</h1>
<p>Enter your prompt below</p>

<textarea id="prompt" placeholder="Type your prompt here..."></textarea>
<br><br>
<button onclick="sendPrompt()">Generate Video</button>

<p style="margin-top:40px;">Coming Soon 🚀</p>

</body>
</html>
