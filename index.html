<!DOCTYPE html>
<html>
<head>
<title>AI Video Generator</title>
<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}
button{
background:#00ff00;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
textarea{
width:80%;
height:120px;
border-radius:10px;
padding:10px;
color: black;
}
</style>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
   // Aapki Public Key yahan set kar di gayi hai
   emailjs.init("7nmy7Endz5mBgcErO"); 
})();

function sendPrompt(){
   var promptValue = document.getElementById("prompt").value;
   
   if(promptValue == ""){ 
      alert("Please enter a prompt"); 
      return; 
   }

   // Aapki Service ID aur Template ID yahan set hain
   // Note: 'message' wahi variable hai jo aapne EmailJS template mein {{message}} likha hoga
   var templateParams = {
      message: promptValue
   };

   emailjs.send("service_e2ix46l", "template_7rjirg", templateParams)
   .then(function(response) {
      alert("Prompt sent successfully! Check your email.");
      document.getElementById("prompt").value = ""; // Form clear karne ke liye
   }, function(error) {
      alert("Error sending prompt: " + JSON.stringify(error));
   });
}
</script>
</head>
<body>

<h1>Premium AI Video Generator</h1>
<p>Enter your prompt below</p>

<textarea id="prompt" placeholder="Type your prompt here..."></textarea>
<br><br>
<button onclick="sendPrompt()">Generate Video</button>

<p style="margin-top:40px;">Coming Soon 🚀</p>

</body>
</html>
